name: SEC RSS Feed Automation

# Prevent parallel runs from colliding and breaking the git push
concurrency:
  group: sec-rss-updater
  cancel-in-progress: true

on:
  schedule:
    # Runs at minutes 22 and 44 of every hour, Monday-Friday.
    # This avoids the "top of the hour" congestion spike.
    - cron: '17 10-23 * * 1-5'
    - cron: '17 0-2 * * 2-6'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run SEC RSS Pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Pull latest changes with rebase to keep commit history clean
          git pull origin main --rebase --autostash
          git add adsh_db.json high_water_mark.txt feed.xml
          
          # Accurately check only the staging area
          if ! git diff --staged --quiet; then
            git commit -m "Automated update: SEC RSS feed and database"
            git push origin main
          else
            echo "No new filings found. Skipping commit."
          fi
